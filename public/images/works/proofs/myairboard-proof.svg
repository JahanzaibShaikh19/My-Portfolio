      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6f7fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      .dark{fill:#101827}.muted{fill:#6b7280}.brand{fill:#8b5cf6}.soft{fill:#f4f4f5}.line{stroke:#e5e7eb;stroke-width:2}.txt{font-family:Inter,Arial,sans-serif}.bold{font-weight:800}.med{font-weight:600}
    </style>
  </defs>
  <rect width="2048" height="913" fill="url(#bg)"/>
  <rect x="0" y="0" width="2048" height="82" fill="#fff"/>
  <line x1="0" y1="82" x2="2048" y2="82" class="line"/>
  <rect x="46" y="25" width="28" height="28" rx="8" fill="none" stroke="#8b5cf6" stroke-width="5"/>
  <circle cx="60" cy="39" r="7" class="brand"/>
  <text x="88" y="50" class="txt bold dark" font-size="29">airboard</text>
  <text x="215" y="50" class="txt med muted" font-size="21">Home</text>
