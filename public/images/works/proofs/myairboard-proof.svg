    <text x="1515" y="735" class="txt med muted" font-size="18">Welcome to your airboard, one place for all your Properties</text>
    <rect x="1515" y="790" width="155" height="88" rx="12" fill="#fff"/>
    <rect x="1690" y="790" width="155" height="88" rx="12" fill="#fff"/>
    <text x="1535" y="822" class="txt med muted" font-size="16">Bookings</text>
    <text x="1535" y="858" class="txt bold dark" font-size="28">6</text>
    <text x="1710" y="822" class="txt med muted" font-size="16">Revenue</text>
    <text x="1710" y="858" class="txt bold dark" font-size="28">Rs 32,700.00</text>
