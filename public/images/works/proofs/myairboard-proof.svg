  <text x="372" y="395" class="txt bold dark" font-size="19">6 Completed</text>
  <rect x="1440" y="380" width="245" height="95" rx="14" fill="#fff" stroke="#e5e7eb" filter="url(#shadow)" transform="rotate(-5 1562 427)"/>
