  <text x="1024" y="340" text-anchor="middle" class="txt med muted" font-size="28">My airboard centralizes everything you need to manage your rentals</text>
  <text x="1024" y="382" text-anchor="middle" class="txt med muted" font-size="28">seamlessly, built for modern hosts and agencies.</text>
  <rect x="840" y="430" width="285" height="64" rx="12" fill="#000"/>
  <text x="982" y="470" text-anchor="middle" fill="#fff" class="txt bold" font-size="22">Discover our offers</text>
  <text x="1024" y="535" text-anchor="middle" class="txt med muted" font-size="21">From Rs2500/month. Try it free for 7 days.</text>

